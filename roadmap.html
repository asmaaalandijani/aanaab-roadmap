<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aanaab — Product Roadmap 2026</title>
<style>
  :root {
    --bg: #f8f9fb;
    --panel: #ffffff;
    --panel-2: #f1f3f7;
    --panel-3: #fafbfc;
    --border: #e2e5ed;
    --border-strong: #c9cdd6;
    --text: #1a1d24;
    --text-soft: #3a3f4a;
    --muted: #6b7280;
    --accent: #4f46e5;
    --accent-soft: #eef2ff;
    --accent-2: #7c3aed;
    --pill: #f3f4f7;
    --pill-strong: #e8ebf2;
    --shadow: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px rgba(15,23,42,0.06);
    --r: 10px;
    --col-width: 92px;
    --label-width: 240px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.45;
  }
  .page { max-width: 1500px; margin: 0 auto; padding: 32px 28px 64px; }
  .breadcrumb { color: var(--muted); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  h1.title { font-size: 28px; margin: 0 0 4px; letter-spacing: -0.01em; }
  .subtitle { color: var(--muted); margin: 0 0 24px; }

  .legend {
    display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 10px 12px;
    margin-bottom: 16px;
  }
  .phase-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--pill);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text);
  }

  .grid-wrapper {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: auto;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .grid {
    display: grid;
    /* gets set by JS based on number of month columns */
  }

  /* Headers */
  .header-q {
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.02em;
  }
  .header-q.first {
    background: var(--panel-2);
    grid-row: span 2;
    text-align: left;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .header-month {
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 8px 6px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  /* Milestone row */
  .milestone-cell {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 8px 6px;
    background: var(--accent-soft);
    min-height: 32px;
  }
  .milestone-cell.first {
    text-align: left;
    padding: 10px 14px;
    color: var(--text);
    font-weight: 600;
    font-size: 12px;
  }
  .milestone-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: #ffffff;
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    padding: 3px 7px;
    font-size: 10px;
    line-height: 1.2;
    white-space: nowrap;
  }
  .milestone-pill.emphasis {
    background: var(--accent);
    color: #ffffff;
    border: 1px solid var(--accent);
    font-weight: 600;
  }

  /* Workstream rows */
  .ws-name {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    background: var(--panel-2);
  }
  .ws-name h3 {
    margin: 0; font-size: 13px; color: var(--text);
  }
  .ws-name .ws-subtitle {
    margin: 3px 0 0;
    font-size: 11px;
    color: var(--muted);
  }
  .ws-cell {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 4px;
    display: flex; flex-direction: column; gap: 4px;
    align-items: center;
    justify-content: flex-start;
    min-height: 46px;
  }

  .initiative {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 5px 7px;
    font-size: 11px;
    line-height: 1.25;
    text-align: left;
    width: 100%;
  }
  .initiative.emphasis {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .initiative.continuation {
    background: transparent;
    border-style: dashed;
    border-color: var(--border-strong);
    color: var(--muted);
    font-style: italic;
  }
  .initiative .icon { font-size: 12px; flex-shrink: 0; }
  .initiative .label { font-size: 11px; }

  /* Sub-workstreams */
  .sub-ws-name {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px 8px 28px;
    background: var(--panel);
    color: var(--muted);
    font-size: 11px;
  }
  .sub-ws-name::before { content: "↳ "; color: var(--muted); }
  .sub-ws-cell {
    background: var(--panel-3);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 4px;
    display: flex; flex-direction: column; gap: 4px;
    align-items: center;
    min-height: 40px;
  }

  .section-divider {
    margin: 32px 0 12px;
  }
  .section-divider h2 { font-size: 18px; margin: 0 0 4px; }
  .section-divider p { color: var(--muted); margin: 0 0 8px; font-size: 12px; }

  .footer {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    color: var(--muted);
    font-size: 11px;
  }
</style>
</head>

  <div id="footer" class="footer"></div>

<script>
(function () {
  const DATA = JSON.parse(document.getElementById('roadmap-data').textContent);
  const phaseById = Object.fromEntries(DATA.phases.map(p => [p.id, p]));
  const monthIds = DATA.months.map(m => m.id);

  // Header
  document.getElementById('header').innerHTML = `
    <div class="breadcrumb">${DATA.meta.brand} · ${DATA.meta.confidentiality}</div>
    <h1 class="title">${DATA.meta.title}</h1>
    <p class="subtitle">${DATA.meta.subtitle}</p>
  `;

  // Legend
  document.getElementById('legend').innerHTML = DATA.phases.map(p =>
    `<span class="phase-chip"><span>${p.icon}</span><span>${p.label}</span></span>`
  ).join('');

  // Build the grid template-columns: 1 label + N months
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `var(--label-width) repeat(${monthIds.length}, minmax(var(--col-width), 1fr))`;

  let html = '';

  // Row 1: workstream label + quarter group headers
  html += `<div class="header-q first">Workstream</div>`;
  DATA.quarters.forEach(q => {
    const span = q.months.length;
    html += `<div class="header-q" style="grid-column: span ${span};">${q.label}</div>`;
  });

  // Row 2: month labels (skip first col — it spans 2 rows)
  DATA.months.forEach(m => {
    html += `<div class="header-month">${m.label}</div>`;
  });

  // Milestone row
  html += `<div class="milestone-cell first">Milestones</div>`;
  monthIds.forEach(mid => {
    const ms = DATA.milestones.filter(m => m.month === mid);
    html += `<div class="milestone-cell">${ms.map(m =>
      `<span class="milestone-pill ${m.emphasis ? 'emphasis' : ''}">${m.icon} ${m.label}</span>`
    ).join(' ')}</div>`;
  });

  // Workstream rows
  DATA.workstreams.forEach(ws => {
    html += `<div class="ws-name">
      <h3>${ws.name}</h3>
      ${ws.subtitle ? `<p class="ws-subtitle">${ws.subtitle}</p>` : ''}
    </div>`;
    monthIds.forEach((mid, idx) => {
      const items = (ws.initiatives || []).filter(i => (i.months || []).includes(mid));
      html += `<div class="ws-cell">${items.map(item => renderInitiative(item, mid)).join('')}</div>`;
    });

    (ws.sub_workstreams || []).forEach(sub => {
      html += `<div class="sub-ws-name">${sub.name}</div>`;
      monthIds.forEach(mid => {
        const items = (sub.initiatives || []).filter(i => (i.months || []).includes(mid));
        html += `<div class="sub-ws-cell">${items.map(item => renderInitiative(item, mid)).join('')}</div>`;
      });
    });
  });

  grid.innerHTML = html;

  // Future section (2027+) — quarter-level only
  if (DATA.future_section) {
    const fs = DATA.future_section;
    const fsQs = fs.quarters.map(q => q.id);
    let fsHtml = `
      <div class="section-divider">
        <h2>${fs.title}</h2>
        <p>${fs.subtitle}</p>
      </div>
      <div class="grid-wrapper">
        <div class="grid" style="grid-template-columns: var(--label-width) repeat(${fsQs.length}, minmax(160px, 1fr));">
          <div class="header-q first">Workstream</div>
          ${fs.quarters.map(q => `<div class="header-q">${q.label}</div>`).join('')}
    `;
    fs.workstreams.forEach(ws => {
      fsHtml += `<div class="ws-name">
        <h3>${ws.name}</h3>
        ${ws.subtitle ? `<p class="ws-subtitle">${ws.subtitle}</p>` : ''}
      </div>`;
      fsQs.forEach(qid => {
        const items = (ws.initiatives || []).filter(i => i.quarter === qid);
        fsHtml += `<div class="ws-cell">${items.map(item => renderInitiative(item)).join('')}</div>`;
      });
    });
    fsHtml += `</div></div>`;
    document.getElementById('future-section').innerHTML = fsHtml;
  }

  // Footer
  document.getElementById('footer').innerHTML = `
    <div>${DATA.meta.footer}</div>
    <div>${DATA.meta.version}</div>
  `;

  function renderInitiative(item, currentMonthId) {
    const phase = phaseById[item.phase];
    const icon = item.icon_override || (phase ? phase.icon : '•');
    // For multi-month items, show full label only in the first month; show a continuation pill in subsequent months
    let isContinuation = false;
    if (currentMonthId && item.months && item.months.length > 1) {
      const firstMonth = item.months[0];
      isContinuation = (currentMonthId !== firstMonth);
    }
    const labelHtml = isContinuation
      ? `<span class="label">— continued —</span>`
      : `<span class="label">${escapeHtml(item.label)}</span>`;
    const classes = ['initiative'];
    if (item.emphasis) classes.push('emphasis');
    if (isContinuation) classes.push('continuation');
    return `<span class="${classes.join(' ')}">
      <span class="icon">${icon}</span>${labelHtml}
    </span>`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[ch]));
  }
})();
</script>
</body>
</html>
