meta:
  title: "Product Roadmap 2026"
  subtitle: "HCDaaS Transformation · Q2 → Q4 2026 · Building toward the October 2026 Summit"
  brand: "aanaab"
  confidentiality: "Internal · Confidential"
  version: "v3.0 · Q2 2026 (month-view)"
  footer: "Aanaab Product & Experience · May 2026 · Timelines subject to discovery findings — not a commitment document"

# Phase legend
phases:
  - { id: discovery, icon: "🔍", label: "Discovery" }
  - { id: design,    icon: "🎨", label: "Design" }
  - { id: build,     icon: "⚙️", label: "Build" }
  - { id: beta,      icon: "🧪", label: "Beta" }
  - { id: launch,    icon: "🚀", label: "Launch" }
  - { id: iterate,   icon: "🔁", label: "Iterate" }

# Quarter groupings (top header row, spans across months)
quarters:
  - { id: q2_2026, label: "Q2 2026", months: [apr_2026, may_2026, jun_2026] }
  - { id: q3_2026, label: "Q3 2026", months: [jul_2026, aug_2026, sep_2026] }
  - { id: q4_2026, label: "Q4 2026", months: [oct_2026, nov_2026, dec_2026] }
  - { id: future,  label: "2027+",   months: [future] }

# Month columns (bottom header row)
months:
  - { id: apr_2026, label: "Apr" }
  - { id: may_2026, label: "May" }
  - { id: jun_2026, label: "Jun" }
  - { id: jul_2026, label: "Jul" }
  - { id: aug_2026, label: "Aug" }
  - { id: sep_2026, label: "Sep" }
  - { id: oct_2026, label: "Oct" }
  - { id: nov_2026, label: "Nov" }
  - { id: dec_2026, label: "Dec" }
  - { id: future,   label: "→ 2027" }

# Top-bar milestones (placed at a specific month)
milestones:
  - { month: apr_2026, icon: "★",  label: "Q2 Kick-off" }
  - { month: sep_2026, icon: "🔒", label: "Feature Freeze" }
  - { month: oct_2026, icon: "🚀", label: "SUMMIT LAUNCH", emphasis: true }
  - { month: dec_2026, icon: "★",  label: "Year-End Review" }

# B2B Layer — 2026 workstreams
# Each initiative carries a `months: [...]` array. Single-month items have one entry. Multi-month items list every month they span.
workstreams:

  - id: aanaab_com
    name: "Aanaab.com"
    subtitle: "Platform Enhancement"
    initiatives:
      - { label: "UX Audit & Journey Mapping",   phase: discovery, months: [jun_2026] }
      - { label: "Enhanced Journey UX",          phase: design,    months: [jul_2026, aug_2026] }
      - { label: "Learner Journey Enhancement",  phase: build,     months: [aug_2026, sep_2026, oct_2026, nov_2026, dec_2026] }
    sub_workstreams:
      - id: referral_points_system
        name: "Referral and Points System"
        initiatives:
          - { label: "Referral System UX",    phase: design, months: [jun_2026, jul_2026] }
          - { label: "Referral System Build", phase: build,  months: [aug_2026] }

  - id: professional_dna
    name: "Professional DNA™"
    subtitle: "Assessments + T-Shape + PGI"
    initiatives:
      - { label: "PJF Instrument Selection + Architecture", phase: discovery, months: [apr_2026] }
      - { label: "Progressive Profiling UX (4 Tiers)",      phase: design,    months: [may_2026] }
      - { label: "Phase 1 Instruments (E3, C3, C4)",        phase: build,     months: [jun_2026] }
      - { label: "Role Mastery + T-Shape Visualizer",       phase: build,     months: [jul_2026] }
      - { label: "Internal DNA Beta",                       phase: beta,      months: [aug_2026] }
      - { label: "Professional DNA™ Live",                  phase: launch,    months: [sep_2026] }
      - { label: "Phase 2: Personality + 360° Feedback",    phase: build,     months: [nov_2026] }
    sub_workstreams:
      - id: pgi_capability_crest
        name: "PGI Score + CapabilityCrest™"
        initiatives:
          - { label: "PGI Engine + Drop Signal System", phase: build,  months: [aug_2026] }
          - { label: "PGI + CapabilityCrest™ MVP",      phase: beta,   months: [oct_2026] }
          - { label: "PGI Score Live",                  phase: launch, months: [nov_2026] }
          - { label: "Full Badge Tier Expansion",       phase: build,  months: [future] }

  - id: content_engine
    name: "Content Engine"
    subtitle: "AI Atomization + SCC Tagging"
    initiatives:
      - { label: "Content Ops Audit + SCC Framework Design", phase: discovery, months: [apr_2026] }
      - { label: "AI Atomization Architecture (COPE)",       phase: design,    months: [may_2026] }
      - { label: "Master Content Workflow + SCC Tagging",    phase: build,     months: [jun_2026] }
      - { label: "AI Atomization Engine MVP",                phase: build,     months: [jul_2026] }
      - { label: "First 40–50 Asset Batch",                  phase: beta,      months: [aug_2026] }
      - { label: "Engine Live",                              phase: launch,    months: [sep_2026] }
      - { label: "SCC Expansion + Partnerships",             phase: iterate,   months: [nov_2026], icon_override: "📈" }
    sub_workstreams:
      - id: content_production
        name: "Content Production"
        initiatives:
          - { label: "Education Sector Master Content (2×/week)", phase: build,   months: [may_2026], icon_override: "📹" }
          - { label: "Corporate Sector Content Sprint",           phase: build,   months: [aug_2026], icon_override: "📹" }
          - { label: "Continuous Production Cycle",               phase: iterate, months: [nov_2026], icon_override: "📹" }

  - id: cgp
    name: "Capability Growth Platform"
    subtitle: "CGP — 4-Pillar Learning Experience"
    initiatives:
      - { label: "Microlearning UX Research + Competitive Analysis", phase: discovery, months: [apr_2026] }
      - { label: "TikTok-Style Feed Architecture",                   phase: design,    months: [may_2026] }
      - { label: "Microlearning Feed MVP (Video, Carousels, Podcasts)", phase: build,  months: [jun_2026] }
      - { label: "Feed + DNA + PGI Integration",                     phase: beta,      months: [aug_2026] }
      - { label: "Microlearning Live",                               phase: launch,    months: [sep_2026] }
      - { label: "Engagement Optimization + AI Briefings",           phase: iterate,   months: [nov_2026] }
    sub_workstreams:
      - id: learn_from_colleagues
        name: "Learn from Colleagues"
        initiatives:
          - { label: "Mentoring Architecture + Knowledge Sharing UX", phase: design,  months: [jun_2026] }
          - { label: "Mentoring Matching + 1:1 Mentoring",            phase: build,   months: [jul_2026] }
          - { label: "Knowledge Capsules + Group Mentoring",          phase: build,   months: [aug_2026] }
          - { label: "Colleagues Live",                               phase: launch,  months: [sep_2026] }
          - { label: "Community + Job Shadowing",                     phase: iterate, months: [nov_2026] }
      - id: learn_from_experience
        name: "Learn from Experience"
        initiatives:
